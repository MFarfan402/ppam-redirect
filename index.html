<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPAM Eventos - Redirigiendo...</title>
  <meta http-equiv="refresh" content="5;url=https://www.ppam-gdl.app">
  <link rel="icon" type="image/jpeg" href="ppam-logo.jpeg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e5a99 0%, #2c7cb8 50%, #4a9fd1 100%);
      color: #fff;
      padding: 20px;
      overflow: hidden;
    }

    .container {
      text-align: center;
      max-width: 500px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 220px;
      height: 220px;
      margin: 0 auto 30px;
      border-radius: 50%;
      background: #fff;
      padding: 10px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 30px;
      opacity: 0.95;
      line-height: 1.5;
    }

    .countdown {
      font-size: 3rem;
      font-weight: 700;
      margin: 20px 0;
      color: #fff;
    }

    .btn {
      display: inline-block;
      padding: 14px 36px;
      background: #fff;
      color: #1e5a99;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 50px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
      background: #f0f7ff;
    }

    .new-link {
      margin-top: 25px;
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .new-link a {
      color: #fff;
      text-decoration: underline;
      font-weight: 600;
    }

    .progress-bar {
      width: 100%;
      max-width: 300px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      margin: 20px auto;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #fff;
      width: 0%;
      animation: fillBar 5s linear forwards;
    }

    @keyframes fillBar {
      to { width: 100%; }
    }

    @media (max-width: 480px) {
      .logo { width: 160px; height: 160px; }
      h1 { font-size: 1.5rem; }
      p { font-size: 1rem; }
      .countdown { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="ppam-logo.jpeg" alt="PPAM Eventos">
    </div>
    <h1>¡Tenemos nuevo sitio!</h1>
    <p>Te estamos redirigiendo a nuestra nueva página en <strong>3</strong> segundos... </p>
    <div class="countdown" id="countdown">3</div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <a href="https://www.ppam-gdl.app" class="btn">Ir ahora</a>
    <p class="new-link">
      O visítanos en: <a href="https://www.ppam-gdl.app">www.ppam-gdl.app</a>
    </p>
  </div>

  <script>
    const redirectUrl = 'https://www.ppam-gdl.app';
    let seconds = 3;
    const countdownEl = document.getElementById('countdown');

    const timer = setInterval(() => {
      seconds--;
      countdownEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = redirectUrl;
      }
    }, 1000);
  </script>
</body>
</html>
